<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Graveyard — A Resting Place for Dead Businesses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --night-1: #0a0e1a;
    --night-2: #131828;
    --night-3: #1c2136;
    --moon: #f4e4c1;
    --moon-dim: #d4c4a1;
    --stone: #9a978f;
    --stone-dark: #5f5c55;
    --stone-shadow: #2a2825;
    --ivy: #3d5a3d;
    --blood: #8b2e2e;
    --mist: rgba(180, 200, 220, 0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: radial-gradient(ellipse at top, var(--night-3) 0%, var(--night-2) 35%, var(--night-1) 100%);
    color: var(--moon-dim);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Stars */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, white, transparent),
      radial-gradient(1px 1px at 65% 8%, white, transparent),
      radial-gradient(1px 1px at 85% 22%, #ccc, transparent),
      radial-gradient(1.5px 1.5px at 15% 40%, white, transparent),
      radial-gradient(1px 1px at 45% 55%, #aaa, transparent),
      radial-gradient(1px 1px at 75% 35%, white, transparent),
      radial-gradient(1px 1px at 92% 65%, #bbb, transparent),
      radial-gradient(1px 1px at 32% 78%, white, transparent),
      radial-gradient(1.5px 1.5px at 55% 18%, #ddd, transparent),
      radial-gradient(1px 1px at 8% 65%, white, transparent);
    background-size: 100% 100%;
    pointer-events: none;
    z-index: 0;
    animation: twinkle 8s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* Fog layer */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 200px at 20% 90%, var(--mist), transparent),
      radial-gradient(ellipse 600px 150px at 80% 95%, var(--mist), transparent),
      radial-gradient(ellipse 1000px 250px at 50% 100%, var(--mist), transparent);
    pointer-events: none;
    z-index: 1;
  }

  .container { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; padding: 0 2rem; }

  /* Hero */
  .hero {
    text-align: center;
    padding: 6rem 2rem 4rem;
    position: relative;
  }

  .moon {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--moon) 0%, var(--moon-dim) 70%, #8a7a5a 100%);
    margin: 0 auto 2rem;
    box-shadow:
      0 0 60px rgba(244, 228, 193, 0.3),
      0 0 120px rgba(244, 228, 193, 0.15),
      inset -10px -10px 30px rgba(0,0,0,0.3);
    position: relative;
  }
  .moon::before, .moon::after {
    content: '';
    position: absolute;
    background: rgba(0,0,0,0.12);
    border-radius: 50%;
  }
  .moon::before { width: 18px; height: 18px; top: 30%; left: 55%; }
  .moon::after { width: 12px; height: 12px; top: 60%; left: 30%; }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--moon);
    text-shadow: 0 0 40px rgba(244, 228, 193, 0.2), 0 4px 0 var(--stone-shadow);
    margin-bottom: 1rem;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--moon-dim);
    opacity: 0.8;
    letter-spacing: 0.05em;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-top: 3rem;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--moon);
    display: block;
  }
  .stat-label {
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--moon-dim);
    opacity: 0.6;
  }

  /* Filters */
  .filters {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin: 3rem 0 4rem;
    padding: 0 1rem;
  }
  .filter-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.8rem 1.4rem;
    background: rgba(154, 151, 143, 0.08);
    border: 1px solid rgba(154, 151, 143, 0.25);
    color: var(--moon-dim);
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 2px;
  }
  .filter-btn:hover {
    background: rgba(244, 228, 193, 0.1);
    border-color: var(--moon);
    color: var(--moon);
  }
  .filter-btn.active {
    background: var(--moon);
    color: var(--night-1);
    border-color: var(--moon);
  }

  /* Cemetery */
  .cemetery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 3rem 2rem;
    padding: 2rem 0 6rem;
    align-items: end;
  }

  .tombstone {
    position: relative;
    width: 100%;
    max-width: 240px;
    margin: 0 auto;
    cursor: pointer;
    transition: transform 0.4s ease;
    animation: rise 0.8s ease-out backwards;
  }

  .tombstone:hover {
    transform: translateY(-8px);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stone {
    width: 100%;
    aspect-ratio: 3 / 4;
    background:
      linear-gradient(170deg,
        #b0ada5 0%,
        #9a978f 30%,
        #7a7770 65%,
        #5f5c55 100%);
    border-radius: 50% 50% 4px 4px / 35% 35% 4px 4px;
    padding: 2.5rem 1.2rem 1.5rem;
    box-shadow:
      inset 3px 3px 6px rgba(255,255,255,0.12),
      inset -3px -3px 8px rgba(0,0,0,0.35),
      0 15px 25px rgba(0,0,0,0.6),
      0 5px 0 var(--stone-shadow);
    position: relative;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: var(--stone-shadow);
  }

  /* Cracks */
  .stone::before {
    content: '';
    position: absolute;
    top: 20%;
    right: 15%;
    width: 1px;
    height: 30%;
    background: rgba(0,0,0,0.25);
    transform: rotate(15deg);
    border-radius: 50%;
  }

  /* Moss at base */
  .stone::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: -5%;
    right: -5%;
    height: 8px;
    background: linear-gradient(180deg, transparent, var(--ivy) 80%);
    border-radius: 50%;
    opacity: 0.4;
    filter: blur(2px);
  }

  .rip {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: var(--stone-shadow);
    opacity: 0.7;
    margin-bottom: 0.5rem;
  }

  .name {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: 1.05rem;
    line-height: 1.15;
    color: var(--stone-shadow);
    text-shadow:
      1px 1px 0 rgba(255,255,255,0.15),
      -1px -1px 1px rgba(0,0,0,0.25);
    margin-bottom: 0.75rem;
    word-break: break-word;
  }

  .dates {
    font-family: 'Special Elite', monospace;
    font-size: 0.85rem;
    color: var(--stone-shadow);
    opacity: 0.85;
    margin: 0.5rem 0;
  }
  .dates-label {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    opacity: 0.6;
    margin-right: 0.3rem;
  }

  .age {
    font-size: 0.8rem;
    font-style: italic;
    opacity: 0.7;
    margin-top: 0.5rem;
  }

  .cause {
    font-size: 0.75rem;
    font-style: italic;
    color: var(--stone-shadow);
    opacity: 0.75;
    margin-top: 0.5rem;
    line-height: 1.3;
    padding: 0 0.2rem;
  }

  /* Category earth mound (subtle ground variation) */
  .tombstone::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 10%;
    right: 10%;
    height: 20px;
    background: radial-gradient(ellipse at center top, var(--night-3) 0%, transparent 70%);
    z-index: -1;
  }

  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 26, 0.92);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 2rem;
    animation: fadeIn 0.3s ease;
  }
  .modal-bg.open { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: linear-gradient(180deg, var(--night-3), var(--night-2));
    border: 1px solid rgba(244, 228, 193, 0.2);
    max-width: 500px;
    width: 100%;
    padding: 3rem;
    color: var(--moon);
    text-align: center;
    position: relative;
    animation: rise 0.5s ease-out;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 6px;
    background: var(--moon);
    opacity: 0.6;
  }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1.5rem;
    background: none;
    border: none;
    color: var(--moon-dim);
    font-size: 1.5rem;
    cursor: pointer;
    font-family: 'Cinzel', serif;
  }
  .modal h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    color: var(--moon);
  }
  .modal-category {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--blood);
    margin-bottom: 2rem;
  }
  .modal-dates {
    font-family: 'Special Elite', monospace;
    font-size: 1.1rem;
    color: var(--moon-dim);
    margin: 1rem 0;
  }
  .modal-epitaph {
    font-style: italic;
    font-size: 1.15rem;
    line-height: 1.6;
    margin: 2rem 0;
    color: var(--moon-dim);
    border-top: 1px solid rgba(244, 228, 193, 0.15);
    border-bottom: 1px solid rgba(244, 228, 193, 0.15);
    padding: 1.5rem 0;
  }
  .modal-cause {
    font-size: 0.95rem;
    color: var(--moon-dim);
    opacity: 0.8;
  }
  .modal-cause strong {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    display: block;
    margin-bottom: 0.5rem;
    opacity: 0.7;
  }

  /* Ground */
  .ground {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(180deg, transparent, var(--night-1));
    z-index: 1;
    pointer-events: none;
  }

  footer {
    text-align: center;
    padding: 3rem 2rem 4rem;
    font-style: italic;
    opacity: 0.5;
    font-size: 0.95rem;
  }

  @media (max-width: 600px) {
    .cemetery { gap: 2rem 1rem; }
    .hero { padding: 4rem 1rem 2rem; }
    .stats { gap: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="hero">
    <div class="moon"></div>
    <h1>The Graveyard</h1>
    <p class="subtitle">Where dead businesses are laid to rest</p>
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="stat-count">—</span>
        <span class="stat-label">Souls at rest</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-oldest">—</span>
        <span class="stat-label">Oldest resident</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-recent">—</span>
        <span class="stat-label">Most recent burial</span>
      </div>
    </div>
  </header>

  <nav class="filters" id="filters"></nav>

  <section class="cemetery" id="cemetery"></section>

  <footer>
    <p>"The grave's a fine and private place, <br>but none, I think, do there embrace."</p>
  </footer>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <p class="modal-category" id="modal-category"></p>
    <h2 id="modal-name"></h2>
    <p class="modal-dates" id="modal-dates"></p>
    <p class="modal-epitaph" id="modal-epitaph"></p>
    <p class="modal-cause"><strong>Cause of death</strong><span id="modal-cause"></span></p>
  </div>
</div>

<div class="ground"></div>

<script>
const graves = [
  // Gaming
  { name: "E3", category: "Gaming", born: 1995, died: 2023, cause: "Publisher exodus + online showcases", epitaph: "Once gaming's Super Bowl. Sony left first. Nintendo followed. COVID delivered the killing blow." },
  { name: "Casual Connect", category: "Gaming", born: 2005, died: 2019, cause: "Mobile market consolidation", epitaph: "The go-to conference for the casual gaming boom. When mobile stopped being novel, so did it." },
  { name: "Spike VGAs", category: "Gaming", born: 2003, died: 2013, cause: "Reborn as The Game Awards", epitaph: "Cringe-filled but beloved. Reincarnated by Geoff Keighley into something classier." },
  { name: "GDC Europe", category: "Gaming", born: 2009, died: 2016, cause: "Absorbed by main GDC", epitaph: "Cologne's developer conference. Quietly folded into gamescom's orbit." },

  // Tech
  { name: "Theranos", category: "Tech", born: 2003, died: 2018, cause: "Fraud", epitaph: "$9 billion valuation built on a machine that didn't work. Elizabeth Holmes became a cautionary tale." },
  { name: "Quibi", category: "Tech", born: 2020, died: 2020, cause: "Nobody wanted it", epitaph: "$1.75 billion raised. Six months alive. A premium mobile-only streaming service during a pandemic when everyone was home." },
  { name: "FTX", category: "Tech", born: 2019, died: 2022, cause: "Crypto fraud", epitaph: "Super Bowl ads, stadium naming rights, celebrity endorsements. Then the bank run. SBF is in prison." },
  { name: "Pets.com", category: "Tech", born: 1998, died: 2000, cause: "Dot-com bust", epitaph: "The sock puppet mascot outlived the company. A monument to the first bubble." },
  { name: "Webvan", category: "Tech", born: 1999, died: 2001, cause: "Too early, too fast", epitaph: "Online grocery delivery before anyone wanted it. Burned $800M building warehouses in 26 cities." },
  { name: "Vine", category: "Tech", born: 2013, died: 2017, cause: "Twitter couldn't monetize it", epitaph: "Six-second videos changed internet comedy forever. Then Twitter killed it and TikTok ate the corpse." },
  { name: "Google+", category: "Tech", born: 2011, died: 2019, cause: "Nobody showed up", epitaph: "Google forced it on every user. They still didn't use it. A data breach provided the mercy kill." },
  { name: "MySpace", category: "Tech", born: 2003, died: 2011, cause: "Outcompeted by Facebook", epitaph: "Technically still online. Spiritually deceased. A generation's first social graph." },

  // Retail
  { name: "Blockbuster", category: "Retail", born: 1985, died: 2010, cause: "Disrupted by Netflix", epitaph: "Turned down buying Netflix for $50M in 2000. Filed for bankruptcy 10 years later. One store remains in Bend, Oregon." },
  { name: "Toys R Us", category: "Retail", born: 1948, died: 2018, cause: "Private equity debt", epitaph: "A generation's paradise strangled by leveraged buyout debt while Amazon ate its lunch." },
  { name: "Borders", category: "Retail", born: 1971, died: 2011, cause: "Bet wrong on digital", epitaph: "Outsourced online sales to Amazon. Dismissed ebooks. Watched Barnes & Noble pull ahead and never caught up." },
  { name: "Circuit City", category: "Retail", born: 1949, died: 2009, cause: "Fired its best employees", epitaph: "Laid off its highest-paid sales staff to cut costs. Sales collapsed. Best Buy feasted." },

  // Banking / Finance
  { name: "Lehman Brothers", category: "Finance", born: 1850, died: 2008, cause: "Subprime collapse", epitaph: "158 years old. The bankruptcy that broke the global economy. Nobody was allowed to bail them out." },
  { name: "Bear Stearns", category: "Finance", born: 1923, died: 2008, cause: "Liquidity crisis", epitaph: "Sold to JPMorgan for $2 a share. The first domino of the 2008 crisis." },
  { name: "Washington Mutual", category: "Finance", born: 1889, died: 2008, cause: "Bank run", epitaph: "Largest bank failure in US history. Seized by the FDIC in September 2008." },
  { name: "Silicon Valley Bank", category: "Finance", born: 1983, died: 2023, cause: "Twitter bank run", epitaph: "40 years of serving startups, undone in 48 hours when VCs tweeted each other into a panic." },
  { name: "Credit Suisse", category: "Finance", born: 1856, died: 2023, cause: "Scandal fatigue", epitaph: "167 years of Swiss banking. Swallowed by UBS in an emergency government-brokered sale." },
  { name: "Signature Bank", category: "Finance", born: 2001, died: 2023, cause: "Crypto contagion", epitaph: "Went down in the same week as SVB. Too much crypto exposure for regulators to stomach." },

  // Sports
  { name: "AAF", category: "Sports", born: 2019, died: 2019, cause: "Ran out of money", epitaph: "The Alliance of American Football. Eight weeks of games. Collapsed before the first season ended." },
  { name: "USFL (original)", category: "Sports", born: 1983, died: 1985, cause: "Donald Trump's lawsuit", epitaph: "Won an antitrust case against the NFL. The damages: three dollars. League folded." },
  { name: "XFL 1.0", category: "Sports", born: 2001, died: 2001, cause: "Terrible football", epitaph: "Vince McMahon's first try. One season of bad football and bad theater. $70 million lost." },
  { name: "XFL 2.0", category: "Sports", born: 2020, died: 2020, cause: "COVID + bankruptcy", epitaph: "McMahon's second try. Five weeks in, the pandemic hit. Never recovered." },
  { name: "NFL Europe", category: "Sports", born: 1991, died: 2007, cause: "$30M annual losses", epitaph: "Once called the WLAF. Sixteen years of trying to sell American football to Europeans. They preferred football football." },
];

let activeFilter = 'All';
const categories = ['All', ...new Set(graves.map(g => g.category))];

function render() {
  // Filters
  const filters = document.getElementById('filters');
  filters.innerHTML = categories.map(cat =>
    `<button class="filter-btn ${cat === activeFilter ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  filters.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => { activeFilter = btn.dataset.cat; render(); };
  });

  // Graves
  const filtered = activeFilter === 'All' ? graves : graves.filter(g => g.category === activeFilter);
  const cemetery = document.getElementById('cemetery');
  cemetery.innerHTML = filtered.map((g, i) => {
    const age = g.died - g.born;
    const ageStr = age === 0 ? 'lived mere months' : `aged ${age} year${age === 1 ? '' : 's'}`;
    return `
      <div class="tombstone" data-idx="${graves.indexOf(g)}" style="animation-delay: ${i * 0.04}s">
        <div class="stone">
          <div>
            <div class="rip">R · I · P</div>
            <div class="name">${g.name}</div>
          </div>
          <div>
            <div class="dates"><span class="dates-label">b.</span>${g.born}</div>
            <div class="dates"><span class="dates-label">d.</span>${g.died}</div>
            <div class="age">${ageStr}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  cemetery.querySelectorAll('.tombstone').forEach(el => {
    el.onclick = () => openModal(graves[el.dataset.idx]);
  });

  // Stats
  document.getElementById('stat-count').textContent = graves.length;
  const oldest = graves.reduce((a, b) => (b.died - b.born) > (a.died - a.born) ? b : a);
  document.getElementById('stat-oldest').textContent = `${oldest.died - oldest.born} yrs`;
  const recent = graves.reduce((a, b) => b.died > a.died ? b : a);
  document.getElementById('stat-recent').textContent = recent.died;
}

function openModal(g) {
  document.getElementById('modal-name').textContent = g.name;
  document.getElementById('modal-category').textContent = g.category;
  document.getElementById('modal-dates').textContent = `${g.born} — ${g.died}  ·  ${g.died - g.born} years`;
  document.getElementById('modal-epitaph').textContent = `"${g.epitaph}"`;
  document.getElementById('modal-cause').textContent = g.cause;
  document.getElementById('modal').classList.add('open');
}

document.getElementById('modal-close').onclick = () =>
  document.getElementById('modal').classList.remove('open');
document.getElementById('modal').onclick = (e) => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
};

render();
</script>
</body>
</html>
